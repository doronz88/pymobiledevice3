<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 84px;
    background: radial-gradient(125% 140% at 82% 8%, #3949ab 0%, #1a237e 52%, #0c1030 100%);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #ffffff;
    position: relative;
    overflow: hidden;
  }
  .row { display: flex; align-items: center; gap: 40px; z-index: 1; }
  .logo-wrap {
    flex: none; width: 300px; height: 300px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.10) 38%, rgba(255,255,255,0) 70%);
  }
  .logo { height: 280px; }
  .name { font-size: 82px; font-weight: 800; letter-spacing: -2px; line-height: 1.02; }
  .name .v { color: #ffd43b; }
  .tagline { margin-top: 30px; font-size: 38px; font-weight: 400; color: #ccd3f7; max-width: 1050px; line-height: 1.3; z-index: 1; }
  .pill { display:inline-block; margin-top: 30px; font-size: 25px; color:#9fb0ec; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; z-index:1; }
  .bar { position:absolute; left:0; bottom:0; height:12px; width:100%; background: linear-gradient(90deg,#3b74c4 0%,#3b74c4 50%,#ffd43b 50%,#ffd43b 100%); }
</style>
</head>
<body>
  <div class="row">
    <div class="logo-wrap"><img class="logo" src="logo.png"></div>
    <div class="name">pymobile<br>device<span class="v">3</span></div>
  </div>
  <div class="tagline">A pure-Python 3 toolkit for working with iOS devices — CLI <b>+</b> API, on Windows, Linux &amp; macOS.</div>
  <div class="pill">$ python3 -m pip install -U pymobiledevice3</div>
  <div class="bar"></div>
</body>
</html>
