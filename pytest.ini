[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error
    error::ResourceWarning
    # TODO remove when cached-property fixes asyncio.iscoroutinefunction usage (a PR is already open)
    ignore:.*asyncio\.iscoroutinefunction.*deprecated.*:DeprecationWarning:cached_property$
markers =
    cli: tests for cli interface
