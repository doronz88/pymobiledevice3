name: Python application

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - '.github/workflows/python-app.yml'
      - 'pymobiledevice3/**'
      - 'requirements.txt'
      - 'pyproject.toml'
  release:
    types: [ created ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: '! github.event.pull_request.draft'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            requirements.txt
      - name: Run pre-commit hooks
        # pyright needs the project's dependencies installed; it runs in the dedicated job below.
        env:
          SKIP: pyright
        run: uvx pre-commit run --all-files
      - name: Test show usage
        run: uv run --extra test pytest -m cli

  pyright:
    if: '! github.event.pull_request.draft'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            requirements.txt
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[test]"
      # Runs the same pre-commit hook contributors get locally (pinned in .pre-commit-config.yaml).
      - name: Run pyright
        run: uvx pre-commit run pyright --all-files
